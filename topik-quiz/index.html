<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOPIK II 모의고사 · 3·4급</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="spark s1"></span>
    <span class="spark s2"></span>
    <span class="spark s3"></span>
  </div>

  <!-- START -->
  <section id="screenStart" class="screen active">
    <div class="hero-card">
      <div class="hero-mascot" aria-hidden="true">
        <div class="mascot-face">
          <span class="eye left"></span>
          <span class="eye right"></span>
          <span class="blush left"></span>
          <span class="blush right"></span>
          <span class="smile"></span>
        </div>
        <div class="mascot-book"></div>
      </div>

      <p class="eyebrow">TOPIK II · 3·4급</p>
      <h1>한국어능력시험<br /><span class="title-soft">모의고사</span></h1>
      <p class="hero-desc">
        어휘 · 문법 · 읽기 · 듣기를 한곳에!
        시험 중에는 한국어로 진행되고, 제출 후에 다국어 해설을 볼 수 있어요.
      </p>

      <div class="section-chips">
        <span class="chip vocab">어휘</span>
        <span class="chip grammar">문법</span>
        <span class="chip reading">읽기</span>
        <span class="chip listening">듣기</span>
      </div>

      <div class="info-grid">
        <div class="info-tile">
          <strong>20</strong>
          <span>문항</span>
        </div>
        <div class="info-tile">
          <strong>40</strong>
          <span>분</span>
        </div>
        <div class="info-tile">
          <strong>A–D</strong>
          <span>선택</span>
        </div>
        <div class="info-tile">
          <strong>5</strong>
          <span>언어 해설</span>
        </div>
      </div>

      <div class="hero-actions">
        <button type="button" class="btn primary" id="btnStart">
          <span>시험 시작</span>
          <span class="btn-shine" aria-hidden="true"></span>
        </button>
        <button type="button" class="btn ghost" id="btnShowHistory">이전 결과 보기</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="screenQuiz" class="screen">
    <header class="quiz-bar">
      <div class="quiz-brand">
        <span class="mark" aria-hidden="true"></span>
        <div>
          <strong>TOPIK II</strong>
          <small id="sectionLabel">어휘</small>
        </div>
      </div>
      <div class="timer-wrap">
        <span class="timer-label">남은 시간</span>
        <div class="timer" id="timer" aria-live="polite">40:00</div>
      </div>
      <button type="button" class="btn tiny danger" id="btnSubmitEarly">제출하기</button>
    </header>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progressText">1 / 20</span>
        <span id="answeredText">응답 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="q-nav" id="qNav"></div>
    </div>

    <article class="question-card" id="questionCard">
      <div class="q-head">
        <p class="q-num" id="qNum">문제 1</p>
        <span class="section-pill" id="sectionPill">어휘</span>
      </div>
      <p class="q-stem" id="qStem"></p>
      <div class="q-passage" id="qPassage"></div>
      <div class="listen-box hidden" id="listenBox">
        <div class="listen-wave" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
        <button type="button" class="btn listen" id="btnPlayAudio">듣기 재생</button>
        <p class="listen-hint">음성을 듣고 답을 고르십시오. 다시 들을 수 있어요.</p>
      </div>
      <div class="choices" id="choices"></div>
      <div class="nav-row">
        <button type="button" class="btn ghost" id="btnPrev">← 이전</button>
        <button type="button" class="btn primary" id="btnNext">다음 →</button>
      </div>
    </article>
  </section>

  <!-- RESULT -->
  <section id="screenResult" class="screen">
    <div class="result-card">
      <div class="result-head">
        <div>
          <p class="eyebrow">채점 결과</p>
          <h2 id="resultTitle">수고했어요!</h2>
        </div>
        <div class="explain-lang" id="explainLang">
          <span>해설 언어</span>
          <select id="resultLang">
            <option value="ko">한국어</option>
            <option value="vi">Tiếng Việt</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
          </select>
        </div>
      </div>

      <div class="score-banner">
        <div class="score-ring" id="scoreRing" style="--p: 0">
          <strong id="statScore">0%</strong>
          <span>점수</span>
        </div>
        <div class="stats-grid">
          <div class="stat ok">
            <p>정답</p>
            <strong id="statCorrect">0</strong>
          </div>
          <div class="stat bad">
            <p>오답</p>
            <strong id="statWrong">0</strong>
          </div>
          <div class="stat">
            <p>미응답</p>
            <strong id="statBlank">0</strong>
          </div>
        </div>
      </div>

      <div class="section-stats" id="sectionStats"></div>
      <div class="review-list" id="reviewList"></div>

      <div class="hero-actions sticky-actions">
        <button type="button" class="btn primary" id="btnRetry">다시 풀기</button>
        <button type="button" class="btn ghost" id="btnToHistory">결과 기록</button>
        <button type="button" class="btn ghost" id="btnHome">처음으로</button>
      </div>
    </div>
  </section>

  <!-- HISTORY -->
  <section id="screenHistory" class="screen">
    <div class="result-card">
      <div class="result-head">
        <div>
          <p class="eyebrow">History</p>
          <h2>이전 시험 결과</h2>
        </div>
        <button type="button" class="btn tiny ghost" id="btnClearHistory">기록 삭제</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
      <div class="hero-actions">
        <button type="button" class="btn primary" id="btnHistoryStart">새 시험 시작</button>
        <button type="button" class="btn ghost" id="btnHistoryHome">처음으로</button>
      </div>
    </div>
  </section>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
